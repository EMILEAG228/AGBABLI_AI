<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AGBABLI AI</title>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg">
    <link rel="apple-touch-icon" href="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --red: #ff1a1a; --red-dark: #b30000; --black: #0a0a0a; --black-light: #141414;
            --gray: #2a2a2a; --gray-light: #3a3a3a; --text: #f1f1f1; --text-dim: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: var(--black); color: var(--text);
            display: flex; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--red-dark) 0%, transparent 35%),
                        radial-gradient(circle at 80% 20%, #330000 0%, transparent 35%);
            filter: blur(120px); z-index: -1; animation: move 18s infinite alternate ease-in-out;
        }
        @keyframes move {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
            100% { transform: translate(8%, 8%) rotate(15deg); opacity: 0.8; }
        }
     .sidebar {
            width: 280px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px);
            border-right: 1px solid var(--red-dark); display: flex; flex-direction: column;
            padding: 15px; transition: transform 0.3s ease; z-index: 100;
        }
     .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
     .sidebar-header img { width: 32px; height: 32px; border-radius: 6px; }
     .sidebar-header h3 { font-family: 'Rajdhani'; font-size: 20px; }
     .new-chat,.history-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px;
            cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 14px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
     .new-chat { border: 1px solid var(--gray); margin-bottom: 15px; }
     .new-chat:hover,.history-item.active { background: var(--black-light); }
     .history-list { flex: 1; overflow-y: auto; }
     .history-list::-webkit-scrollbar { width: 4px; }
     .history-list::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 2px; }
     .sidebar-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray); }
        #install-btn {
            width: 100%; padding: 10px; background: var(--red); border: none; border-radius: 8px;
            color: #fff; font-weight: 600; cursor: pointer; display: none;
        }
     .main { flex: 1; display: flex; flex-direction: column; height: 100%; }
        header {
            padding: 12px 16px; background: rgba(10,10,10,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--red-dark); display: flex; align-items: center; gap: 12px;
        }
     .logo-img { width: 34px; height: 34px; border-radius: 8px; box-shadow: 0 0 15px var(--red); }
        h1 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
        h1 span { color: var(--red); }
        #menu-btn { background: none; border: none; color: var(--text); font-size: 18px; }
        #status { margin-left: auto; font-size: 12px; color: var(--text-dim); }
        #status.loading { color: var(--red); animation: pulse 1s infinite; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 0; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 3px; }
     .msg-wrapper {
            display: flex; gap: 12px; padding: 16px 0; max-width: 800px; margin: 0 auto;
            width: 92%; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
     .msg-wrapper.ia { background: var(--black-light); width: 100%; padding: 16px 0; }
     .msg-wrapper.ia > div { max-width: 800px; margin: 0 auto; width: 92%; display: flex; gap: 12px; }
     .avatar { width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0; display: grid; place-items: center; font-size: 14px; }
     .avatar.user { background: var(--gray-light); }
     .avatar.ia img { width: 100%; height: 100%; border-radius: 6px; }
     .msg-content { line-height: 1.7; flex: 1; font-size: 15px; }
     .sticker { font-size: 24px; margin-top: 8px; display: inline-block; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
     .welcome { text-align: center; margin-top: 10vh; max-width: 500px; margin-left: auto; margin-right: auto; padding: 0 20px; }
     .welcome img { width: 70px; height: 70px; margin: 0 auto 20px; border-radius: 16px; }
     .welcome h2 { font-family: 'Rajdhani'; font-size: 32px; margin-bottom: 12px; }
     .welcome p { color: var(--text-dim); font-size: 15px; }
     .input-area { padding: 12px 12px 16px; width: 100%; }
     .input-container { max-width: 820px; margin: 0 auto; }
     .input-box {
            position: relative; border: 1px solid var(--gray); border-radius: 16px;
            background: var(--black-light); display: flex; align-items: flex-end;
            padding: 6px; transition: 0.2s;
        }
     .input-box:focus-within { border-color: var(--red); box-shadow: 0 0 15px rgba(255,26,26,0.2); }
        #prompt {
            flex: 1; background: transparent; border: none; color: #fff; font-size: 16px;
            resize: none; max-height: 120px; outline: none; font-family: 'Inter'; padding: 10px;
        }
     .input-actions { display: flex; gap: 4px; padding: 4px; }
     .icon-btn {
            width: 38px; height: 38px; border: none; background: transparent; color: #aaa;
            border-radius: 10px; cursor: pointer; display: grid; place-items: center; transition: 0.2s;
        }
     .icon-btn:hover:not(:disabled) { background: var(--gray); color: #fff; }
     .icon-btn.recording,.icon-btn.speaking { color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        #send-btn { background: var(--red); color: #fff; }
        #send-btn:disabled { background: var(--gray); opacity: 0.5; }
     .disclaimer { font-size: 11px; color: #666; text-align: center; padding-top: 10px; }
     .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        @media (max-width: 768px) {
         .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
         .sidebar.open { transform: translateX(0); }
         .overlay.show { display: block; }
            #menu-btn { display: grid!important; }
         .msg-wrapper,.msg-wrapper.ia > div { width: 95%; }
            h1 { font-size: 18px; }
         .welcome h2 { font-size: 28px; }
        }
        @media (min-width: 769px) { #menu-btn { display: none; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg">
            <h3>AGBABLI AI</h3>
        </div>
        <div class="new-chat" onclick="newChat()">
            <i class="fa-solid fa-plus"></i> Nouveau Chat
        </div>
        <div class="history-list" id="history-list"></div>
        <div class="sidebar-footer">
            <button id="install-btn"><i class="fa-solid fa-download"></i> Installer l'app</button>
        </div>
    </div>
    <div class="main">
        <header>
            <button class="icon-btn" id="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <img src="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg" class="logo-img">
            <h1>AGBABLI <span>AI</span></h1>
            <div id="status">Prêt</div>
        </header>
        <div id="chat">
            <div class="welcome" id="welcome">
                <img src="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg">
                <h2>AGBABLI AI</h2>
                <p>Premier lancement : je télécharge le cerveau IA. Ça prend 1-2 min une seule fois. Après, zéro connexion requise.</p>
            </div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <div class="input-box">
                    <textarea id="prompt" rows="1" placeholder="Message à AGBABLI AI..." onkeydown="handleKey(event)" disabled></textarea>
                    <div class="input-actions">
                        <button class="icon-btn" id="call-btn" onclick="toggleCall()" title="Appeler AGBABLI">
                            <i class="fa-solid fa-phone"></i>
                        </button>
                        <button class="icon-btn" id="mic-btn" onclick="toggleVoice()" title="Message vocal">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                        <button class="icon-btn" id="send-btn" onclick="sendMsg()" title="Envoyer" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                <div class="disclaimer">AGBABLI AI tourne sur ton appareil. 100% privé.</div>
            </div>
        </div>
    </div>
<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // === CONFIG ===
    const MODEL_ID = "Llama-3.1-8B-Instruct-q4f32_1-MLC"; // 1.8GB, pas de popup
    const STICKERS = ['✨', '🚀', '💡', '🔥', '💯', '🎯', '⚡', '🌟', '💎', '🎨', '🧠', '✅'];
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('agbabli_ai_chats') || '{}');
    let engine = null;
    let isCallActive = false;
    let speechSynthesis = window.speechSynthesis;

    const chat = document.getElementById('chat');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const callBtn = document.getElementById('call-btn');
    const welcome = document.getElementById('welcome');
    const historyList = document.getElementById('history-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const status = document.getElementById('status');

    let recognition = null;
    let isRecording = false;

    // === PWA INSTALL ===
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', () => {
        installBtn.style.display = 'none';
        deferredPrompt.prompt();
    });
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // === INIT WEBLLM ===
    async function initLLM() {
        status.textContent = 'Téléchargement IA...';
        status.classList.add('loading');
        const initProgressCallback = (report) => {
            status.textContent = `Chargement ${Math.round(report.progress * 100)}%`;
        };
        engine = await webllm.CreateMLCEngine(MODEL_ID, { initProgressCallback });
        status.textContent = 'Prêt';
        status.classList.remove('loading');
        promptInput.disabled = false;
        sendBtn.disabled = false;
    }
    initLLM();

    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    function toggleSidebar() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    // === HISTORIQUE ===
    function saveChats() {
        localStorage.setItem('agbabli_ai_chats', JSON.stringify(chats));
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        Object.keys(chats).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = 'history-item';
            if (id === currentChatId) item.classList.add('active');
            item.innerHTML = `<i class="fa-regular fa-message"></i> ${chats[id].title}`;
            item.onclick = () => loadChat(id);
            historyList.appendChild(item);
        });
    }

    function newChat() {
        currentChatId = Date.now().toString();
        chats[currentChatId] = {
            title: 'Nouveau Chat',
            messages: [
                {role: 'system', content: 'Tu es AGBABLI AI, une IA créée par Emile. Tu es expert, direct et tu tutoies. Tu réponds en français avec un style concis mais complet. Tu es professionnel et amical.'}
            ]
        };
        loadChat(currentChatId);
        if (window.innerWidth <= 768) toggleSidebar();
    }

    function loadChat(id) {
        currentChatId = id;
        const chatData = chats[id];
        chat.innerHTML = '';
        welcome.style.display = 'none';
        chatData.messages.slice(1).forEach(msg => {
            addMsg(msg.content, msg.role === 'user'? 'user' : 'ia', false);
        });
        renderHistory();
        if (window.innerWidth <= 768) toggleSidebar();
    }

    // === UI ===
    function handleKey(e) {
        if (e.key === 'Enter' &&!e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    }

    function addMsg(content, type, withSticker = true) {
        welcome.style.display = 'none';
        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper ' + type;
        const inner = document.createElement('div');
        const avatar = document.createElement('div');
        avatar.className = 'avatar ' + type;
        avatar.innerHTML = type === 'user'
        ? '<i class="fa-solid fa-user"></i>'
            : `<img src="https://amibagroue.wordpress.com/wp-content/uploads/2024/12/img_0227-1.jpg">`;
        const msgContent = document.createElement('div');
        msgContent.className = 'msg-content';
        msgContent.innerText = content;

        if (type === 'ia' && withSticker) {
            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            sticker.innerText = STICKERS[Math.floor(Math.random() * STICKERS.length)];
            msgContent.appendChild(sticker);
        }

        inner.appendChild(avatar);
        inner.appendChild(msgContent);
        wrapper.appendChild(inner);
        chat.appendChild(wrapper);
        chat.scrollTop = chat.scrollHeight;
        return msgContent;
    }

    // === VOCAL INPUT ===
    function toggleVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            alert('Désolé, utilise Chrome ou Edge pour le vocal.');
            return;
        }
        if (isRecording) {
            recognition.stop();
            return;
        }
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = false;
        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('recording');
        };
        recognition.onresult = (e) => {
            promptInput.value = e.results[0][0].transcript;
            promptInput.style.height = 'auto';
            promptInput.style.height = (promptInput.scrollHeight) + 'px';
        };
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };
        recognition.start();
    }

    // === APPEL VOCAL ===
    function toggleCall() {
        if (isCallActive) {
            stopCall();
            return;
        }
        if (!('webkitSpeechRecognition' in window)) {
            alert('Désolé, utilise Chrome ou Edge pour appeler AGBABLI.');
            return;
        }
        isCallActive = true;
        callBtn.classList.add('speaking');
        callBtn.innerHTML = '<i class="fa-solid fa-phone-slash"></i>';
        speak('Salut, c\'est AGBABLI. Je t\'écoute.');
        startListening();
    }

    function stopCall() {
        isCallActive = false;
        callBtn.classList.remove('speaking');
        callBtn.innerHTML = '<i class="fa-solid fa-phone"></i>';
        if (recognition) recognition.stop();
        speechSynthesis.cancel();
    }

    function startListening() {
        if (!isCallActive) return;
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = false;
        recognition.onresult = async (e) => {
            const transcript = e.results[0][0].transcript;
            addMsg(transcript, 'user', false);
            await respondInCall(transcript);
        };
        recognition.onerror = () => {
            if (isCallActive) setTimeout(startListening, 1000);
        };
        recognition.onend = () => {
            if (isCallActive) setTimeout(startListening, 500);
        };
        recognition.start();
    }

    async function respondInCall(userText) {
        if (!currentChatId) newChat();
        chats[currentChatId].messages.push({role: 'user', content: userText});

        const iaMsgDiv = addMsg('...', 'ia', false);
        try {
            const chunks = await engine.chat.completions.create({
                messages: chats[currentChatId].messages,
                stream: true
            });
            let fullText = '';
            iaMsgDiv.innerText = '';
            for await (const chunk of chunks) {
                const delta = chunk.choices[0]?.delta?.content || '';
                fullText += delta;
                iaMsgDiv.innerText = fullText;
            }
            chats[currentChatId].messages.push({role: 'assistant', content: fullText});
            saveChats();

            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            sticker.innerText = STICKERS[Math.floor(Math.random() * STICKERS.length)];
            iaMsgDiv.appendChild(sticker);

            speak(fullText);
        } catch (err) {
            iaMsgDiv.innerText = 'Erreur de connexion.';
            speak('Désolé, j\'ai eu un problème.');
        }
    }

    function speak(text) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.rate = 1.1;
        utterance.pitch = 1;
        speechSynthesis.speak(utterance);
    }

    // === CHAT TEXTE ===
    async function sendMsg() {
        if (!engine) return;
        if (!currentChatId) newChat();
        const userPrompt = promptInput.value.trim();
        if (!userPrompt) return;

        addMsg(userPrompt, 'user', false);
        chats[currentChatId].messages.push({role: 'user', content: userPrompt});
        if (chats[currentChatId].messages.length === 2) {
            chats[currentChatId].title = userPrompt.substring(0, 30);
        }

        promptInput.value = '';
        promptInput.style.height = 'auto';
        sendBtn.disabled = true;

        const iaMsgDiv = addMsg('...', 'ia', false);

        try {
            const chunks = await engine.chat.completions.create({
                messages: chats[currentChatId].messages,
                stream: true
            });
            let fullText = '';
            iaMsgDiv.innerText = '';
            for await (const chunk of chunks) {
                const delta = chunk.choices[0]?.delta?.content || '';
                fullText += delta;
                iaMsgDiv.innerText = fullText;
                chat.scrollTop = chat.scrollHeight;
            }
            chats[currentChatId].messages.push({role: 'assistant', content: fullText});
            saveChats();

            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            sticker.innerText = STICKERS[Math.floor(Math.random() * STICKERS.length)];
            iaMsgDiv.appendChild(sticker);

        } catch (err) {
            iaMsgDiv.innerText = 'Erreur: ' + err.message;
        }
        sendBtn.disabled = false;
        promptInput.focus();
    }

    // === START ===
    renderHistory();
    if (Object.keys(chats).length === 0) newChat();
    else loadChat(Object.keys(chats).pop());
</script>
</body>
</html>
